name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/SimpleWebsite
            cd /home/ubuntu
            if [ ! -d "SimpleWebsite/.git" ]; then
              git clone https://github.com/gitlassian/ServerCICD.git SimpleWebsite
            fi
            cd SimpleWebsite
            git pull origin main
            docker compose up -d --build
