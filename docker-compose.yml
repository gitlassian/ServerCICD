services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: simplewebsiteapp:latest
    container_name: simplewebsiteapp
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
    